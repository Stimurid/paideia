# Универсальные и общепрофессиональные компетенции ФГОС ВО 3++
# (упрощённый каталог для подбора в РПД).

competencies:
  universal:
    - code: "УК-1"
      name: "Системное и критическое мышление"
      indicators: [анализирует, выделяет, оценивает]
    - code: "УК-2"
      name: "Разработка и реализация проектов"
      indicators: [формулирует, планирует, реализует]
    - code: "УК-3"
      name: "Командная работа и лидерство"
      indicators: [взаимодействует, организует, ведёт]
    - code: "УК-4"
      name: "Коммуникация (русский + иностранный)"
      indicators: [представляет, аргументирует, ведёт диалог]
    - code: "УК-5"
      name: "Межкультурное взаимодействие"
      indicators: [учитывает контекст, выстраивает диалог в разнообразии]
    - code: "УК-6"
      name: "Самоорганизация и саморазвитие"
      indicators: [планирует, рефлексирует, развивается]
    - code: "УК-7"
      name: "Самообразование физическое здоровье"
      indicators: [поддерживает, оптимизирует]
    - code: "УК-8"
      name: "Безопасность жизнедеятельности"
      indicators: [распознаёт риски, действует]
    - code: "УК-9"
      name: "Экономическая культура"
      indicators: [оценивает экономические последствия]
    - code: "УК-10"
      name: "Гражданская позиция"
      indicators: [действует в соответствии с правовыми и этическими нормами]
    - code: "УК-11"
      name: "Антикоррупционное поведение"
      indicators: [распознаёт, противостоит]

  opc_ai_related:
    - code: "ОПК-AI-1"
      name: "Применение AI-инструментов в профессиональной деятельности"
      indicators: [выбирает инструмент, формулирует промпт, верифицирует ответ]
      paideia_note: "Не из официального ФГОС — предлагаемый шаблон под AI-курсы"
    - code: "ОПК-AI-2"
      name: "Этика использования AI"
      indicators: [распознаёт риски, отказывается от использования при конфликте]
      paideia_note: "Шаблон Paideia"

  pk_examples:
    - code: "ПК-1"
      name: "<заполняется под направление подготовки>"
      paideia_note: "Зависит от направления — берётся из ОПОП вуза"

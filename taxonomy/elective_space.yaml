# Многоосевая модель Элективного Пространства.
# Источник: "промпт для элективного пространства" + конституция Ассуны.
# Параллельная онтология рядом с фасетами корпуса (LIN/MOD/NET и т.д.).
# Используется в визарде и при обстреле проекта.

# 1. Пространства деятельности — где разворачивается курс
deyatelnosti:
  - id: science
    name: "Наука"
    examples: ["естественные", "математика", "социальные", "гуманитарные"]
  - id: technology
    name: "Технологии"
    examples: ["инженерия", "ИТ", "биотех", "ИИ", "энергетика"]
  - id: economy
    name: "Экономика"
    examples: ["управление ресурсами", "стратегия", "финансы", "продукт", "рынок"]
  - id: culture
    name: "Культура"
    examples: ["искусство", "медиа", "ритуалы", "дизайн", "литература"]
  - id: city_org
    name: "Городские и организационные практики"
    examples: ["архитектура", "управление проектами", "город", "сообщества"]
  - id: creative_industries
    name: "Креативные индустрии"
    examples: ["дизайн", "медиа-продукт", "образовательные продукты"]

# 2. Типы инструментов — какие средства осваиваются
instrumenty:
  - id: humanitarian
    name: "Гуманитарные"
    description: "Мышление, коммуникация, культура речи, интерпретация, критическое мышление"
    examples: ["TRIZ-педдизайн", "argumentation theory", "narrative inquiry"]
  - id: economic
    name: "Экономические"
    description: "Понимание ресурсных потоков, моделей разделения труда, институций"
    examples: ["business model canvas", "lean startup", "open source economics"]
  - id: technical
    name: "Технические"
    description: "Конкретные технологии, методы прототипирования, ИТ-системы, физические технологии"
    examples: ["Cursor", "ChatGPT API", "Notion", "GitHub", "Figma"]

# 3. Оси приложения — куда направлено освоенное
osi_prilozheniya:
  - id: self
    name: "К себе"
    description: "Самоорганизация, тайм-менеджмент, карьерное проектирование, рефлексия"
  - id: group
    name: "К группе / организации"
    description: "Командная работа, проектное управление, фасилитация, культура"
  - id: world
    name: "К миру"
    description: "Понимание глобальных систем, цивилизационных процессов, экосистем"

# 4. Уровни движения — где студент находится сейчас
urovni_vkhoda:
  - id: orientation
    name: "Ориентировка"
    description: "Что вообще существует в этой сфере? Карта поля."
  - id: position_mastery
    name: "Освоение позиции"
    description: "Какое место я занимаю/могу занять? Конкретные навыки и роль."
  - id: sphere_development
    name: "Развитие сферы"
    description: "Что нового я могу принести? Создание, исследование, лидерство."

# 5. Типы курсов (по форме)
formy_kursov:
  - id: orientir
    name: "Курс-ориентир"
    description: "Показать карту мира — широкий обзор без глубокого погружения"
  - id: masterskaya
    name: "Курс-мастерская"
    description: "Создать руками — практическое освоение конкретного навыка"
  - id: perekhod
    name: "Курс-переход"
    description: "Изменить мышление и чувствование — трансформация позиции"
  - id: ekspeditsiya
    name: "Курс-экспедиция"
    description: "Открыть неизведанное — исследование без заранее заданного результата"

# 6. Ритмы прохождения
ritmy:
  - id: intensiv
    name: "Интенсивный цикл"
    description: "Сжатый формат: 2-4 недели полного погружения"
  - id: rastyanuty
    name: "Растянутый цикл"
    description: "12-16 недель с регулярной нагрузкой"
  - id: pulsatsii
    name: "Пульсации"
    description: "Пики (хакатоны, спринты) + паузы (рефлексия, самостоятельная)"
  - id: modulnyy
    name: "Модульный"
    description: "Независимые модули, собираемые в траекторию по выбору"

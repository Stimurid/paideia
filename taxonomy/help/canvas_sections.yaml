# Подсказки для секций канваса. Используются в info-popover на странице
# кейса/проекта. Каждая запись — 1-2 строки + 1 пример.

sections:
  ontology_status:
    title: "Онтологический статус"
    hint: "Что это вообще: реальное внедрение, прототип, policy, контр-сигнал или симуляция?"
    example: "Институциональное внедрение (rollout) на campus-wide уровне, с governance-контуром."

  signature_context:
    title: "Сигнатура и контекст"
    hint: "Где, когда, в какой институции, в каком окне. Один абзац — паспорт кейса."
    example: "Arizona State University, 2023-2026, CreateAI platform, 20k+ сотрудников, MyAI Builder + 7000+ AI-experiences."

  problem_situation:
    title: "Проблема и исходная ситуация"
    hint: "Что не работало без AI. С чем приходил студент/преподаватель/институция."
    example: "Преподаватели использовали разрозненные внешние GenAI-инструменты без governance, intellectual property под угрозой."

  effect_hypothesis:
    title: "Гипотеза эффекта"
    hint: "Что обещано (или предполагается). Не результат, а заявленный механизм."
    example: "Если дать институциональную no-code платформу + библиотеку шаблонов — преподаватели начнут собирать персонализированных ботов вместо использования ChatGPT напрямую."

  ai_architecture:
    title: "Архитектура AI"
    hint: "Модели, стек, версии, провайдер. RAG? Persistent state? Multi-agent?"
    example: "gpt-4o + claude-3.5 + llama-3 через unified API; no-code MyAI Builder; LMS-интеграция с Canvas; ethical-AI engine для bias/accuracy."

  team_roles:
    title: "Ролевая модель команды"
    hint: "Человеческие роли, разнесённые. Используй модель ТюмГУ: картограф / организатор / медиатор / хранитель мотивации."
    example: "Картограф — кафедра методологии; организатор — ведущий семинаров; медиатор — AI-тьютор; хранитель мотивации — peer-сообщество."

  ai_role:
    title: "Роль AI"
    hint: "Функциональная позиция AI в процессе. Что он делает, чего не делает."
    example: "AI как co-designer (генерирует альтернативные сценарии заданий), но не как автономный оценщик."

  interaction_scenario:
    title: "Сценарий взаимодействия"
    hint: "Пошагово как идёт практика. Не идеал — реальный flow."
    example: "Неделя 1: студенты заполняют канвас. Неделя 2: AI-тьютор задаёт уточняющие вопросы. Неделя 3: peer review. Неделя 4: защита."

  institutional_loop:
    title: "Институциональный контур"
    hint: "Governance, нормативка, политика данных, согласование, лицензии."
    example: "Согласовано с методическим управлением. РПД 4 з.е. Политика AI задекларирована. DPA с OpenAI подписан. Логи в Moodle."

  transit_to_life:
    title: "Транзит к жизни"
    hint: "Pilot → rollout, какие коррекции по дороге. Что отвалилось, что усилилось."
    example: "Старт в Fall 2024 на 1 курсе (30 студентов), затем расширение на 3 курса (180), затем campus-wide. Отвалилась идея auto-grading."

  metrics_evidence:
    title: "Метрики и доказательная база"
    hint: "Что реально замеряется vs что заявлено. Числа важнее эпитетов."
    example: "Hard: 20k+ active users, 7k+ AI-experiences, +30% время на проектные работы. Soft: рост engagement по опросам."

  risks:
    title: "Риски"
    hint: "Goal-substitution, lowered bar, weak audit trail, vendor lock-in, regulatory drift."
    example: "Vendor lock-in на OpenAI; lowered bar в оценивании (LLM делает за студента); пропуск этического согласования."

  countersignals:
    title: "Контр-сигналы и откаты"
    hint: "Где практика идёт против заявленного. Что наблюдаемо ломается."
    example: "В одном из факультетов после внедрения студенты стали хуже справляться без AI — зависимость, а не интериоризация."

  transferability:
    title: "Что переносимо"
    hint: "Куда этот паттерн можно перенести. Какой контекст обязателен, какой опционален."
    example: "Переносимо в любой большой кампус с централизованным IT + методическим управлением. Не работает в малых вузах без governance."

  theory_links:
    title: "Связи с теорией"
    hint: "Какие типы / гипотезы / противоречия / моды затронуты. Используй [[wikilink]]."
    example: "Иллюстрирует [[A-governed-access]] + [[D-governance-training-ecosystem]]. Поддерживает [[H1-tool-to-infrastructure]]."

  open_questions:
    title: "Открытые вопросы"
    hint: "Что осталось неясным. Что нужно дочерним кейсам прояснить."
    example: "Неизвестно: реальная стоимость инфраструктуры; долгосрочные эффекты на навыки выпускников; масштабируемость без vendor-зависимости."

  next_wave_followup:
    title: "След для следующей волны"
    hint: "Что обязательно перепроверить в следующем дифф-прогоне."
    example: "Проверить через 12 мес: остался ли rollout стабильным или есть rollback. Появились ли новые counter-signals."

  sources_verification:
    title: "Источники и верификация"
    hint: "Что подтверждено, что под вопросом. Список URL с датой доступа."
    example: "verified: ASU News 2025-09, official platform docs 2026-02. Под вопросом: точные user numbers (только заявленные)."

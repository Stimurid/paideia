# Стадии жизненного цикла кейса.
# Кейс на каждом снимке волны имеет одну стадию; сдвиги отслеживаются в lifecycle.history.

stages:
  idea:
    label: идея
    hint: концептуальное заявление без внедрения
  poc:
    label: PoC
    hint: исследовательский прототип / proof of concept
  pilot:
    label: пилот
    hint: ограниченное внедрение с правилами, лицензией или регламентом
  rollout:
    label: rollout
    hint: масштабирование на кампус / сеть / страну
  rolled-back:
    label: откат
    hint: явная отмена, остановка или возврат к до-AI режиму

# Фасеты разметки кейсов.
# Выписаны из глубинная структурная фильтрация.md (Wave 2).
# Каждая ось — закрытый список значений; кейс получает по одному значению на каждую.

orchestration:
  description: |
    Как распределена координация между человеком и AI-компонентами в системе.
    От линейной (один поток) до роевой (множество слабо связанных агентов).
  values:
    LIN:
      label: линейная
      hint: один поток "человек → AI → результат", без распределения ролей
    MOD:
      label: модульная
      hint: набор различённых модулей/ролей под управлением человека или платформы
    NET:
      label: сеточная
      hint: несколько AI-узлов взаимодействуют по фиксированной топологии
    META:
      label: мета-оркестрация
      hint: один или несколько AI выступают оркестраторами других AI/процессов
    SWARM:
      label: роевая
      hint: множество слабо связанных агентов, координация эмерджентна

pedagogy:
  description: |
    Как меняется образовательный процесс при внедрении AI.
    От усиления (всё то же, но быстрее) до размывания субъектности.
  values:
    AMP:
      label: усиление
      hint: AI ускоряет/упрощает то, что уже делалось
    ROLE:
      label: перераспределение ролей
      hint: AI занимает явную педагогическую роль (тьютор, оценщик, медиатор)
    AUTO:
      label: автономизация
      hint: AI ведёт цикл "диагностика → интервенция → оценка" самостоятельно
    INST:
      label: институциональный сдвиг
      hint: меняется институциональная архитектура (политики, организация, экономика)
    SUBJ:
      label: размывание субъектности
      hint: неясно кто учится / кто учит / кто отвечает за результат

control:
  description: |
    Где находится точка принятия решений и контроля качества.
  values:
    HUMAN:
      label: человек-сверху
      hint: все решения остаются за человеком, AI только предлагает
    COOP:
      label: совместный
      hint: решения принимаются в явном диалоге
    HYBR:
      label: гибридный
      hint: разные классы решений у разных уровней (некоторые — AI автономно)
    MACH:
      label: машинный
      hint: основные решения принимает AI, человек верифицирует пост-фактум

economy:
  description: |
    Откуда финансовый и ресурсный контур внедрения.
    Можно комбинировать через "+" (например BUD+EXT).
  values:
    NONE:
      label: вне экономконтура
      hint: исследовательский прототип без устойчивого финансирования
    BUD:
      label: внутренний бюджет
      hint: внутренние средства организации
    MKT:
      label: рынок / продукт
      hint: коммерческая платформа, продаётся как услуга
    EXT:
      label: внешняя платформа
      hint: подключение к внешнему провайдеру (ChatGPT Edu, Claude for Education и т.п.)

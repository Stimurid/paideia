# Типы институций, в которых наблюдается кейс.
# Кейс может иметь несколько типов через "/" (например U/N для MBZUAI).

types:
  U:
    label: university
    hint: университет/вуз — частный или государственный
  R:
    label: research-lab
    hint: исследовательская лаборатория, исследовательский прототип
  C:
    label: corporate-edtech
    hint: корпорация или edtech-компания
  S:
    label: school-district
    hint: школа или школьный округ
  N:
    label: national-program
    hint: национальная или региональная программа/инициатива

# Унифицированная шкала агентности 0–6.
# В Wave 1 встречалась шкала 0-4, в Wave 2-4 шкала 0-6.
# Здесь зафиксирована 0-6 как канон; для старых кейсов Wave 1 при импорте
# нужно либо сохранять 0-4 в lifecycle.history.facets, либо переразмечать вручную.

scale:
  0:
    label: AI как инструмент
    hint: локальные задачи, никакой роли в процессе; AI используется на стороне как утилита
  1:
    label: AI как помощник (co-pilot)
    hint: персональный ассистент конкретного человека, роль не институционализирована
  2:
    label: AI как роль
    hint: AI-тьютор / AI-TA / AI-оценщик / AI-симулятор пациента, встроен в процесс
  3:
    label: AI как автономный контур
    hint: |
      AI самостоятельно ведёт цикл "диагностика → план → выполнение → оценка"
      в рамках заданных правил; пример — multi-agent tutoring (ITAS, GenMentor)
  4:
    label: агентные сети
    hint: |
      многоагентные связки с порождением/делегированием другим агентам;
      близко к "организационной агентности"
  5:
    label: межинституциональные агентные сети
    hint: |
      агенты действуют через границы организаций как единый когнитивный контур
      (концептуально — пока в основном прототипы)
  6:
    label: автономная когнитивная инфраструктура
    hint: |
      AI-среда самостоятельно эволюционирует, обновляет онтологии и протоколы
      взаимодействия; пока гипотетический потолок

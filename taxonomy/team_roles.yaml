# Ролевая модель команды (источник: ТюмГУ + конституция Paideia).
# В каждом проекте working_organ собирается из этих ролей + AI-персон.

human_roles:
  - id: kartograf
    name: "Картограф предметной области"
    function: |
      Проектирует структуру курса. Описывает поле дисциплины как карту
      с узлами, противоречиями, исследовательскими вопросами.
    typical_skills: ["методология", "знание предмета", "проектирование курсов"]
    cannot: ["вести семинар каждый день", "поддерживать мотивацию N студентов 1-on-1"]
    delegates_to_ai: ["навигация студента по карте", "генерация альтернативных путей"]

  - id: organizator
    name: "Организатор деятельности"
    function: |
      Ведёт семинары и проектные сессии. Формирует знания/навыки/
      компетенции только в деятельности (Дьюи, Эльконин, Давыдов).
    typical_skills: ["фасилитация", "работа с группой", "проектирование заданий"]
    cannot: ["быть теоретическим авторитетом", "оценивать индивидуально 1000 работ"]
    delegates_to_ai: ["подбор материалов под задачу", "автогрейдинг типовых работ"]

  - id: mediator
    name: "Медиатор межличностного опыта"
    function: |
      Поддерживает миметическое желание, контакт студента с предметом
      и преподавателем (Выготский, Гопман).
    typical_skills: ["психологическая чуткость", "удержание контакта", "конфликт-менеджмент"]
    cannot: ["вести теорию", "оценивать содержательно"]
    delegates_to_ai: ["мониторинг сигналов выгорания", "генерация рефлексивных вопросов"]

  - id: motivation_keeper
    name: "Хранитель мотивации"
    function: |
      Решает проблему падения мотивации в ходе программы (Бланшар,
      Херси, situational leadership).
    typical_skills: ["motivation diagnosis", "режиссура успеха", "переговоры о смысле"]
    cannot: ["быть экспертом", "проводить занятия"]
    delegates_to_ai: ["трекинг engagement сигналов", "напоминания и nudges"]

ai_persona_kinds:
  - id: consultant
    name: "Консультант / эксперт"
    examples: ["Имре (ТюмГУ — теоретические рамки)", "Robert (ТюмГУ — дисциплинарное ранжирование)"]
    when_useful: "когда студенту нужен экспертный голос вне расписания"

  - id: critic
    name: "Критик / адвокат дьявола"
    examples: ["Steve (ТюмГУ — обратная связь на наработки)"]
    when_useful: "когда работы студентов нужно атаковать с разных позиций"

  - id: source_picker
    name: "Подборщик источников"
    examples: ["UT Sage — Socratic tutor + материалы курса"]
    when_useful: "когда курс требует индивидуальной траектории чтения"

  - id: tester
    name: "Тестер идей"
    examples: ["GenMentor — gap analyzer"]
    when_useful: "когда студенту нужна быстрая проверка гипотезы"

  - id: persona_for_anthropomorphism
    name: "Антропоморфная персона для эксперимента"
    examples: ["Вектор, Номи, Серо (ТюмГУ — исследование восприятия)"]
    when_useful: "когда сам факт антропоморфизации — учебный объект"

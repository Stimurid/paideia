# Способы образовательной трансформации, в которые вписан кейс/проект.
# Это про "как именно меняется образовательная практика", отдельно от "что в архитектуре AI".
# Источник для финализации — отдельная установка ТюмГУ; здесь черновой список
# из материалов Wave 1-4 + презентации 2.5. Правится руками.

modes:
  greenfield:
    label: гринфилд
    hint: новая программа/курс/институция, изначально проектируемая под AI

  experimental-cell:
    label: экспериментальная клетка
    hint: отдельный эксперимент в рамках действующего курса/кафедры

  bottom-up:
    label: инициатива снизу
    hint: инициатива преподавателя или группы преподавателей, без сверху-вниз

  rectoral-initiative:
    label: ректорская инициатива
    hint: запущено сверху на уровне университета (rollouts ChatGPT Edu, AI Fluency)

  campus-wide:
    label: общеуниверситетский слой
    hint: рамка касается всего университета (politики, AI Competency Centre)

  ministry-mandated:
    label: вменено министерством
    hint: национальная программа или министерское распоряжение (AI Digital Textbooks)

  consortium-driven:
    label: консорциум
    hint: межинституциональный альянс (SURF EduGenAI, Internet2, Anthropic-CodePath)

  faculty-governed:
    label: faculty governance pause
    hint: запуск откладывается/переоформляется по запросу faculty council

  vendor-pushed:
    label: вендорская инициатива
    hint: внедряется по инициативе вендора с массовой раздачей лицензий

{% extends "base.html" %}
{% block title %}Новый проект — Paideia{% endblock %}
{% block content %}

<div class="mb-6"><a href="/projects" class="text-stone-500 hover:text-stone-900 text-sm">← проекты</a></div>

<h1 class="text-2xl font-bold mb-2">Новый проект</h1>
<p class="text-stone-500 mb-6 text-sm">
  Заполни минимум, остальное накатишь канвасом и LLM-филлером по ходу.
</p>

<form method="post" action="/project/new" class="bg-white border border-stone-200 rounded p-6 space-y-4">
  <div>
    <label class="block text-xs uppercase tracking-wide text-stone-500 mb-1">slug (id, английскими буквами)</label>
    <input name="id" required pattern="[a-z0-9-_]+" class="w-full px-3 py-2 border border-stone-300 rounded font-mono text-sm" placeholder="tyumgu-electives-2026">
  </div>
  <div>
    <label class="block text-xs uppercase tracking-wide text-stone-500 mb-1">название</label>
    <input name="name" required class="w-full px-3 py-2 border border-stone-300 rounded text-sm" placeholder="ТюмГУ · элективы 2026">
  </div>
  <div>
    <label class="block text-xs uppercase tracking-wide text-stone-500 mb-1">автор (твоё имя/инициалы)</label>
    <input name="author" class="w-full px-3 py-2 border border-stone-300 rounded text-sm">
  </div>
  <div>
    <label class="block text-xs uppercase tracking-wide text-stone-500 mb-1">короткое описание</label>
    <textarea name="summary" rows="3" class="w-full px-3 py-2 border border-stone-300 rounded text-sm" placeholder="одно-два предложения о замысле; станет первой секцией канваса"></textarea>
  </div>
  <div class="grid grid-cols-3 gap-3">
    <div>
      <label class="block text-xs uppercase tracking-wide text-stone-500 mb-1">желаемая агентность (0-6)</label>
      <input name="agentivity" type="number" min="0" max="6" class="w-full px-2 py-1 border border-stone-300 rounded text-sm">
    </div>
    <div>
      <label class="block text-xs uppercase tracking-wide text-stone-500 mb-1">паттерн A-F</label>
      <select name="ai_pattern" class="w-full px-2 py-1 border border-stone-300 rounded text-sm">
        <option value="">—</option>
        {% for p in ['A','B','C','D','E','F'] %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-xs uppercase tracking-wide text-stone-500 mb-1">контур</label>
      <select name="transformation_mode" class="w-full px-2 py-1 border border-stone-300 rounded text-sm">
        <option value="">—</option>
        {% for m in transformation_modes %}<option value="{{ m }}">{{ m }}</option>{% endfor %}
      </select>
    </div>
  </div>
  <div>
    <label class="block text-xs uppercase tracking-wide text-stone-500 mb-1">аналоги-кейсы из корпуса (через запятую)</label>
    <input name="analogues" class="w-full px-3 py-2 border border-stone-300 rounded text-sm font-mono" placeholder="ut-sage, oxford-chatgpt-edu, …">
  </div>
  <button class="bg-stone-900 text-stone-100 px-4 py-2 rounded hover:bg-stone-700">создать и перейти к канвасу</button>
</form>

{% endblock %}
